<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Acceso - Prestador de Servicios</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        .login-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 350px;
            border: 1px solid #e1e1e1;
        }
        
        h2 {
            color: #da3743;
            margin-top: 0;
            text-align: center;
            font-size: 24px;
        }
        
        p.subtitle {
            text-align: center;
            color: #6f737b;
            font-size: 14px;
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            font-weight: bold;
            font-size: 13px;
            color: #444;
            margin-top: 15px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #d8d9db;
            border-radius: 4px;
            box-sizing: border-box;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background-color: #da3743;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 25px;
            transition: 0.2s;
        }
        
        button:hover {
            background-color: #b8222d;
        }
        
        .toggle-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #6f737b;
        }
        
        .toggle-link {
            color: #da3743;
            cursor: pointer;
            font-weight: bold;
            text-decoration: underline;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <h2 id="form-title">Iniciar Sesión</h2>
        <p class="subtitle">Panel de Administración de Prestador de Servicios</p>

        <form id="auth-form" action="/login" method="POST">

            <div id="name-field" class="hidden">
                <label>Nombre del Negocio / Prestador:</label>
                <input type="text" id="name-input" name="name" placeholder="Ej. Spa Relax">
            </div>

            <label>Correo Electrónico:</label>
            <input type="email" name="email" placeholder="correo@ejemplo.com" required>

            <label>Contraseña:</label>
            <input type="password" name="password" placeholder="••••••••" required>

            <button type="submit" id="submit-btn">Entrar</button>
        </form>

        <div class="toggle-text">
            <span id="toggle-msg">¿No tienes cuenta?</span>
            <span class="toggle-link" onclick="toggleMode()" id="toggle-btn">Registrate aquí</span>
        </div>
    </div>

    <script>
        let isLogin = true;

        function toggleMode() {
            const form = document.getElementById('auth-form');
            const title = document.getElementById('form-title');
            const btn = document.getElementById('submit-btn');
            const toggleMsg = document.getElementById('toggle-msg');
            const toggleBtn = document.getElementById('toggle-btn');
            const nameField = document.getElementById('name-field');
            const nameInput = document.getElementById('name-input');

            isLogin = !isLogin;

            if (isLogin) {
                form.action = "/login";
                title.innerText = "Iniciar Sesión";
                btn.innerText = "Entrar al Panel";
                toggleMsg.innerText = "¿No tienes cuenta?";
                toggleBtn.innerText = "Regístrate aquí";

                nameField.classList.add('hidden');
                nameInput.removeAttribute('required');
            } else {
                form.action = "/register";
                title.innerText = "Crear Cuenta";
                btn.innerText = "Registrarse";
                toggleMsg.innerText = "¿Ya tienes cuenta?";
                toggleBtn.innerText = "Inicia sesión";

                nameField.classList.remove('hidden');
                nameInput.setAttribute('required', 'true');
            }
        }
    </script>
</body>

</html>
